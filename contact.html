<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1 id="contact">Contact Me</h1>
        <nav>
            <a href="index.html">HOME</a>
            <a href="about.html">ABOUT</a>
        </nav>
    </header>
    <main>
        <section>
            <h2>Get in Touch</h2>
            <p class="contact-description">If you'd like to reach out, feel free to contact me via email or social media.</p>
            <h1 id="contact-info">Contact Information</h1>
            <img src="/B16B403C-B727-48CA-BF0B-7CFC47C455B2.jpeg" alt="email icon" class="contact-icon">
  <img src="/rahulpandit-flatlay-5169985_1920.jpg" alt="phone book icon" class="contact-icon">      
  <img src="/dariuszsankowski-notepad-1130743_1920.jpg" alt="notepad icon" class="contact-icon">
  
            <form>
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name"><br><br>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email"><br><br>
                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="4" cols="50"></textarea><br><br>
                <input type="submit" value="Submit">
            </form>
        </section>
    </main>
    <footer>
        <p class="footer-text">&copy; 2024 My Personal Website. All rights reserved.</p>
    </footer>
</body>
</html>
